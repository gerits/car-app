name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Install System Dependencies (Slint Linux requirements)
      run: |
        sudo apt-get update
        sudo apt-get install -y fontconfig libfontconfig1-dev libwayland-dev libxkbcommon-dev xorg-dev

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install Just
      uses: extractions/setup-just@v4
      
    - name: Cache Cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check Formatting
      run: just fmt-check

    - name: Lint
      run: just lint

    - name: Build
      run: just build

    - name: Run Tests
      run: just test


