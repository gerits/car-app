name: Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Install System Dependencies (Slint Linux requirements)
      run: |
        sudo apt-get update
        sudo apt-get install -y fontconfig libfontconfig1-dev libwayland-dev libxkbcommon-dev xorg-dev

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache Cargo Registry & Build
      uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build --verbose

    - name: Run Tests
      run: cargo test --verbose

    - name: Install cargo-tarpaulin
      run: cargo install cargo-tarpaulin

    - name: Run Coverage
      run: cargo tarpaulin --verbose --fail-under 90 --ignore-panics --out Xml
