[package]
name = "car-app"
version = "0.1.0"
edition = "2024"

[dependencies]
flate2 = "1.1.9"
geo-types = "0.7.19"
mvt-reader = "2.3.0"
pmtiles2 = "0.3.2"
slint = "1.16.1"
tiny-skia = "0.12.0"
tokio = { version = "1.52.1", features = ["full"] }
lru = "0.13.0"
log = "0.4.20"
env_logger = "0.11.3"
chrono = "0.4.44"
rspotify = { version = "0.13.3", features = ["cli", "reqwest-native-tls"] }
image = "0.25.1"
reqwest = { version = "0.12", features = ["json"] }
dotenvy = "0.15"
serde_json = "1.0"

[build-dependencies]
slint-build = "1.16.1"
